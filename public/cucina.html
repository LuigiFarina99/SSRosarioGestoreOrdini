<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Monitor Reparti Sagra</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Blocco dello schermo prima del login */
        #bloccoLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        .box-login { background: #333; padding: 30px; border-radius: 10px; border: 2px solid #ff9800; text-align: center; }
        .box-login input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 15px; width: 200px; text-align: center; background: #fff; color: #000; }
        .box-login button { padding: 10px 20px; font-size: 18px; background: #ff9800; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        body { font-family: sans-serif; background: #222; color: white; margin: 0; padding: 15px; }
        .testata { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff9800; padding-bottom: 10px; }
        select { font-size: 18px; padding: 8px; background: #333; color: white; border: 2px solid #ff9800; border-radius: 5px; font-weight: bold; }
        .griglia-ordini { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .scheda-ordine { border: 2px solid #ff9800; background: #333; padding: 15px; border-radius: 10px; width: 260px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .scheda-ordine h3 { margin: 0 0 5px 0; color: #ff9800; border-bottom: 1px solid #555; padding-bottom: 5px; font-size: 22px; }
        .prodotti { font-size: 18px; font-weight: bold; line-height: 1.4; min-height: 70px; color: #fff; margin-top: 10px; }
        .ora { color: #aaa; font-size: 13px; margin-bottom: 10px; }
        .btn-fatto { background: #4caf50; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="bloccoLogin">
    <div class="box-login">
        <h2 style="color: #ff9800; margin-top: 0;">Accesso Monitor Reparti</h2>
        <p>Inserisci la password per operare:</p>
        <input type="password" id="inputPassword" placeholder="Password" onkeydown="if(event.key === 'Enter') controllaPassword()">
        <br>
        <button onclick="controllaPassword()">ACCEDI</button>
    </div>
</div>

    <div class="testata">
        <h2 style="margin:0; font-size: 20px; color: #ff9800;">POSTAZIONE REPARTO</h2>
        <select id="sceltaReparto" onchange="disegnaSchermata()">
            <option value="panini">🍔 Reparto Panini (Salsiccia / Hamburger)</option>
            <option value="brace">🍢 Reparto Arrosticini & Pannocchie</option>
            <option value="caciocavallo">🧀 Reparto Caciocavallo</option>
            <option value="bevande">🍺 Reparto Bevande</option>
            <option value="dolci">🍩 Reparto Dolci</option>
        </select>
    </div>
    <div class="griglia-ordini" id="spazioOrdini"></div>

    <script>
        // --- GESTIONE ACCESSO PASSWORD ---
        if (sessionStorage.getItem('repartiAutenticati') === 'true') {
            document.getElementById('bloccoLogin').style.display = 'none';
        }

        function controllaPassword() {
            const passwordInserita = document.getElementById('inputPassword').value;
            if (passwordInserita === 'Test90') {
                sessionStorage.setItem('repartiAutenticati', 'true');
                document.getElementById('bloccoLogin').style.display = 'none';
            } else {
                alert('Password errata! Accesso negato.');
                document.getElementById('inputPassword').value = '';
            }
        }
        // ---------------------------------

        const socket = io();
        let ordiniLocali = [];

        socket.on('carica-ordini-attivi', (ordini) => { ordiniLocali = ordini; disegnaSchermata(); });
        socket.on('ordine-ricevuto', (ordine) => { 
            ordiniLocali.push(ordine); disegnaSchermata(); 
            new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg').play().catch(()=>{});
        });
        socket.on('rimuovi-ordine-schermo', (id) => { ordiniLocali = ordiniLocali.filter(o => o.id !== parseInt(id)); disegnaSchermata(); });

        function disegnaSchermata() {
            const spazio = document.getElementById('spazioOrdini');
            spazio.innerHTML = '';
            const rep = document.getElementById('sceltaReparto').value;

            ordiniLocali.forEach(o => {
                const stringaProdotti = o[rep];
                if (stringaProdotti && stringaProdotti.trim() !== "") {
                    const div = document.createElement('div');
                    div.className = 'scheda-ordine'; div.id = `ordine-${o.id}`;
                    const testoEvidenziato = stringaProdotti.replace(/\[/g, '<span style="color:#ff5252">[').replace(/\]/g, ']</span>');
                    div.innerHTML = `
                        <div><h3>ORDINE #${o.id}</h3><div class="prodotti">${testoEvidenziato}</div></div>
                        <div><div class="ora">Attesa: ${o.data}</div><button class="btn-fatto" onclick="segnalaPronto(${o.id})">PRONTO</button></div>
                    `;
                    spazio.appendChild(div);
                }
            });
        }
        async function segnalaPronto(id) {
            document.getElementById(`ordine-${id}`)?.remove();
            ordiniLocali = ordiniLocali.filter(o => o.id !== id);
            await fetch('/ordine-pronto', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) });
        }
    </script>
</body>
</html>
