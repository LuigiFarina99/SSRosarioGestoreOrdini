<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Stato Ordini - Consegna</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Blocco dello schermo prima del login */
        #bloccoLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        .box-login { background: #222; padding: 30px; border-radius: 10px; border: 2px solid #ff9800; text-align: center; }
        .box-login input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 15px; width: 200px; text-align: center; background: #fff; color: #000; }
        .box-login button { padding: 10px 20px; font-size: 18px; background: #ff9800; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        body { font-family: sans-serif; background: #111; color: white; margin: 0; padding: 20px; padding-top: 80px; }
        
        .barra-incasso-globale { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: #1a1a1a; 
            color: #fff; 
            padding: 15px 30px; 
            box-sizing: border-box; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 24px; 
            font-weight: bold; 
            border-bottom: 4px solid #ff9800; 
            z-index: 2000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: #ff9800; margin-bottom: 30px; margin-top: 10px; }
        .tabellone { display: flex; gap: 30px; height: 75vh; }
        .colonna { flex: 1; background: #222; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; }
        .colonna h2 { text-align: center; margin-top: 0; padding-bottom: 15px; border-bottom: 3px solid #ff9800; }
        #preparazione h2 { color: #ff9800; border-color: #ff9800; }
        #pronti h2 { color: #4caf50; border-color: #4caf50; }
        .lista { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; }
        
        /* Modificata la voce ordine per adattarsi meglio a una struttura a blocchi */
        .voce-ordine { background: #333; padding: 15px; border-radius: 8px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ff9800; }
        #listaPronti .voce-ordine { border-left-color: #4caf50; }
        .animazione-lampo { animation: lampo 0.5s ease-in-out 3; }
        .numero { font-size: 24px; font-weight: bold; }
        .dettagli { font-size: 16px; color: #ccc; }
        .btn-consegnato { background: #d32f2f; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Modificata la disposizione dello stato reparti: da orizzontale a verticale */
        .stato-reparti { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; font-size: 15px; font-weight: bold; }
        .tag-reparto { padding: 6px 12px; border-radius: 5px; background: #444; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .tag-reparto.pronto { background: #1b5e20; color: #a5d6a7; border-left: 4px solid #4caf50; }
        .tag-reparto.attesa { background: #e65100; color: #ffcc80; border-left: 4px solid #ff9800; }

        @keyframes lampo { 0%, 100% { background: #333; } 50% { background: #2e7d32; } }
    </style>
</head>
<body>

<div id="bloccoLogin">
    <div class="box-login">
        <h2 style="color: #ff9800; margin-top: 0;">Accesso Schermo Consegna</h2>
        <p>Inserisci la password per operare:</p>
        <input type="password" id="inputPassword" placeholder="Password" onkeydown="if(event.key === 'Enter') controllaPassword()">
        <br>
        <button onclick="controllaPassword()">ACCEDI</button>
    </div>
</div>

    <div class="barra-incasso-globale">
        <span>INCASSO TOTALE DELLA SERATA:</span>
        <span id="valoreIncassoTotale" style="color: #4caf50;">€ 0.00</span>
    </div>

    <h1>STATO ORDINAZIONI</h1>
    <div class="tabellone">
        <div class="colonna" id="preparazione"><h2>IN PREPARAZIONE ⏳</h2><div class="lista" id="listaPreparazione"></div></div>
        <div class="colonna" id="pronti"><h2>PRONTI ✅</h2><div class="lista" id="listaPronti"></div></div>
    </div>

    <script>
        // --- GESTIONE ACCESSO PASSWORD ---
        if (sessionStorage.getItem('consegnaAutenticata') === 'true') {
            document.getElementById('bloccoLogin').style.display = 'none';
        }

        function controllaPassword() {
            const passwordInserita = document.getElementById('inputPassword').value;
            if (passwordInserita === 'Test90') {
                sessionStorage.setItem('consegnaAutenticata', 'true');
                document.getElementById('bloccoLogin').style.display = 'none';
            } else {
                alert('Password errata! Accesso negato.');
                document.getElementById('inputPassword').value = '';
            }
        }
        // ---------------------------------

        const socket = io();
        let prodottiMemory = {};
        let ordiniInPrepLocali = []; 
        let prezziOrdiniMemory = {};

        function estraiPrezzo(testoProdotti) {
            try {
                const parti = testoProdotti.split('(Tot: €');
                if (parti.length > 1) {
                    return parseFloat(parti[1].replace(')', '')) || 0;
                }
            } catch(e) {
                console.log("Errore estrazione prezzo", e);
            }
            return 0;
        }

        function aggiornaIncassoGrafico() {
            let somma = 0;
            for (let id in prezziOrdiniMemory) {
                somma += prezziOrdiniMemory[id];
            }
            document.getElementById('valoreIncassoTotale').innerText = `€ ${somma.toFixed(2)}`;
        }

        // AGGIORNATA: Questa funzione ora legge le stringhe di testo reali inviate per ogni specifico reparto
        function generaHtmlStatoReparti(o) {
            let html = '<div class="stato-reparti">';
            const pronti = o.repartiPronti || [];
            
            const mappaReparti = {
                'panini': '🍔 Panini',
                'brace': '🍢 Brace',
                'caciocavallo': '🧀 Caciocavallo',
                'bevande': '🍺 Bevande',
                'dolci': '🍩 Dolci'
            };

            for (let chiave in mappaReparti) {
                // Se questo reparto ha effettivamente dei prodotti registrati nell'ordine
                if (o[chiave] && o[chiave].trim() !== "") {
                    const isPronto = pronti.includes(chiave);
                    const iconaStato = isPronto ? '✅ PRONTO' : '⏳ IN CORSO';
                    const classeStato = isPronto ? 'pronto' : 'attesa';
                    
                    // Sostituiamo le parentesi quadre dei condimenti con delle tonde per una resa estetica più pulita
                    const testoDettagliato = o[chiave].replace(/\[/g, ' (').replace(/\]/g, ')');

                    html += `
                        <div class="tag-reparto ${classeStato}">
                            <span><strong>${mappaReparti[chiave]}:</strong> ${testoDettagliato}</span>
                            <span style="font-size: 12px; font-weight: bold; white-space: nowrap; padding-left: 10px;">${iconaStato}</span>
                        </div>
                    `;
                }
            }
            html += '</div>';
            return html;
        }

        // AGGIORNATA: Strutturato il box per accogliere comodamente le righe di testo
        function aggiungiInPrep(o) {
            if (document.getElementById(`consegna-${o.id}`)) return;
            prodottiMemory[o.id] = o.prodotti;
            prezziOrdiniMemory[o.id] = estraiPrezzo(o.prodotti);

            const div = document.createElement('div');
            div.className = 'voce-ordine'; div.id = `consegna-${o.id}`;
            div.style.flexDirection = 'column';
            div.style.alignItems = 'stretch';
            
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 6px;">
                    <div><span class="numero">#${o.id}</span></div>
                    <div style="font-size:14px; color:#888;">${o.data}</div>
                </div>
                ${generaHtmlStatoReparti(o)}
            `;
            document.getElementById('listaPreparazione').appendChild(div);
            aggiornaIncassoGrafico();
        }

        function aggiungiPronto(id, prod, flash = false) {
            if (document.getElementById(`pronto-${id}`)) return;
            if (prod) {
                prezziOrdiniMemory[id] = estraiPrezzo(prod);
            }

            const div = document.createElement('div');
            div.className = 'voce-ordine' + (flash ? ' animazione-lampo' : ''); div.id = `pronto-${id}`;
            div.innerHTML = `<div><span class="numero" style="color:#4caf50">#${id}</span> <span class="dettagli">${prod || 'Ordine'}</span></div><button class="btn-consegnato">CONSEGNATO</button>`;
            document.getElementById('listaPronti').appendChild(div);
            aggiornaIncassoGrafico();
        }

        socket.on('sincronizza-consegna', (dati) => {
            document.getElementById('listaPreparazione').innerHTML = ''; 
            document.getElementById('listaPronti').innerHTML = '';
            prezziOrdiniMemory = {};

            ordiniInPrepLocali = dati.inPreparazione; 
            dati.inPreparazione.forEach(o => aggiungiInPrep(o));
            dati.pronti.forEach(o => { 
                prodottiMemory[o.id] = o.prodotti; 
                aggiungiPronto(o.id, o.prodotti, false); 
            });
            aggiornaIncassoGlobaleDati(dati.inPreparazione, dati.pronti);
        });

        function aggiornaIncassoGlobaleDati(inPrep, pronti) {
            let totale = 0;
            inPrep.forEach(o => { totale += estraiPrezzo(o.prodotti); prezziOrdiniMemory[o.id] = estraiPrezzo(o.prodotti); });
            pronti.forEach(o => { totale += estraiPrezzo(o.prodotti); prezziOrdiniMemory[o.id] = estraiPrezzo(o.prodotti); });
            document.getElementById('valoreIncassoTotale').innerText = `€ ${totale.toFixed(2)}`;
        }

        socket.on('ordine-ricevuto', (o) => {
            ordiniInPrepLocali.push(o);
            aggiungiInPrep(o);
        });
        
        socket.on('rimuovi-ordine-schermo', (dati) => {
            const ordineLocale = ordiniInPrepLocali.find(o => o.id === parseInt(dati.id));
            if (ordineLocale) {
                if (!ordineLocale.repartiPronti) ordineLocale.repartiPronti = [];
                if (!ordineLocale.repartiPronti.includes(dati.reparto)) {
                    ordineLocale.repartiPronti.push(dati.reparto);
                }
                const elementoOrdine = document.getElementById(`consegna-${dati.id}`);
                if (elementoOrdine) {
                    const contenitoreStato = elementoOrdine.querySelector('.stato-reparti');
                    if (contenitoreStato) {
                        // Sostituisce l'HTML vecchio con la nuova lista aggiornata (cambieranno i colori in base a cosa è pronto)
                        contenitoreStato.outerHTML = generaHtmlStatoReparti(ordineLocale);
                    }
                }
            }
        });

        socket.on('ordine-completato', (id) => {
            document.getElementById(`consegna-${id}`)?.remove();
            ordiniInPrepLocali = ordiniInPrepLocali.filter(o => o.id !== parseInt(id));
            aggiungiPronto(id, prodottiMemory[id] || "Ordine", true);
            new Audio('https://actions.google.com/sounds/v1/notifications/ambient_notification.ogg').play().catch(()=>{});
        });

        async function archivia(id) {
            document.getElementById(`pronto-${id}`)?.remove(); 
            delete prodottiMemory[id];
            await fetch('/ordine-archiviato', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) });
        }
    </script>
</body>
</html>
